<header class="shell-header">
  <div class="brand-block">
    <p class="brand">{{ brand }}</p>
    <p class="tagline">{{ tagline }}</p>
  </div>

  @if (auth.isLoggedIn()) {
    <nav class="nav" aria-label="Principal">
      <a routerLink="/catalogo" routerLinkActive="active">Catálogo</a>
      <a routerLink="/deseados" routerLinkActive="active">Deseados</a>
      <a routerLink="/estadisticas" routerLinkActive="active">Estadísticas</a>
      <button type="button" class="logout" (click)="logout()">Salir</button>
    </nav>
  }
</header>

<main class="shell-main">
  <router-outlet />
</main>
